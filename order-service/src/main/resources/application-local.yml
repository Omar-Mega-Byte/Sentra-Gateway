springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}

management:
  endpoint:
    health:
      show-details: always

sentra:
  order:
    repository:
      mode: ${ORDER_REPOSITORY_MODE:postgres}
      seed-enabled: ${ORDER_SEED_ENABLED:true}
    management:
      openapi-enabled: ${OPENAPI_ENABLED:true}
      swagger-ui-enabled: ${SWAGGER_UI_ENABLED:true}
