spring:
  application:
    name: ${SERVICE_NAME:order-service}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sentra_orders_db}
    username: ${DB_USERNAME:order_service_user}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: ${DB_POOL_MIN_SIZE:2}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      connection-timeout: ${DB_CONNECT_TIMEOUT_MS:3000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:1000}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:20s}
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  server:
    port: ${MANAGEMENT_PORT:${SERVER_PORT:8082}}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    enable:
      all: ${METRICS_ENABLED:true}
    tags:
      application: ${SERVICE_NAME:order-service}
      environment: ${SENTRA_ENVIRONMENT:local}

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:false}
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha

sentra:
  order:
    environment: ${SENTRA_ENVIRONMENT:local}
    instance-id: ${SENTRA_INSTANCE_ID:${random.uuid}}
    service-name: ${SERVICE_NAME:order-service}
    shutdown-timeout: ${SHUTDOWN_TIMEOUT:20s}
    repository:
      mode: ${ORDER_REPOSITORY_MODE:postgres}
      seed-enabled: ${ORDER_SEED_ENABLED:false}
      seed-dataset: ${ORDER_SEED_DATASET:default}
    gateway:
      context-required: ${GATEWAY_CONTEXT_REQUIRED:true}
      allowed-route-ids: ${GATEWAY_ALLOWED_ROUTE_IDS:orders-list,orders-get,orders-create,orders-cancel,admin-orders-list,admin-orders-update}
      allowed-peers: ${GATEWAY_ALLOWED_PEERS:}
      trusted-header-max-length: ${TRUSTED_HEADER_MAX_LENGTH:255}
      request-id-max-length: ${REQUEST_ID_MAX_LENGTH:128}
      subject-max-length: ${SUBJECT_MAX_LENGTH:255}
      tenant-id-max-length: ${TENANT_ID_MAX_LENGTH:128}
    limits:
      max-request-body-bytes: ${MAX_REQUEST_BODY_BYTES:32768}
      max-page-size: ${MAX_PAGE_SIZE:100}
      default-page-size: ${DEFAULT_PAGE_SIZE:20}
      max-page-number: ${MAX_PAGE_NUMBER:10000}
      max-items-per-order: ${MAX_ITEMS_PER_ORDER:50}
      max-sku-length: ${MAX_SKU_LENGTH:64}
      max-item-quantity: ${MAX_ITEM_QUANTITY:100}
      max-error-details: ${MAX_ERROR_DETAILS:20}
    idempotency:
      enabled: ${IDEMPOTENCY_ENABLED:true}
      key-max-length: ${IDEMPOTENCY_KEY_MAX_LENGTH:128}
      retention: ${IDEMPOTENCY_RETENTION:24h}
      max-records: ${IDEMPOTENCY_MAX_RECORDS:10000}
      cleanup-interval: ${IDEMPOTENCY_CLEANUP_INTERVAL:5m}
    management:
      port: ${MANAGEMENT_PORT:${SERVER_PORT:8082}}
      allowed-cidrs: ${MANAGEMENT_ALLOWED_CIDRS:}
      openapi-enabled: ${OPENAPI_ENABLED:false}
      swagger-ui-enabled: ${SWAGGER_UI_ENABLED:false}
      metrics-enabled: ${METRICS_ENABLED:true}
    logging:
      format: ${LOG_FORMAT:text}
      include-order-ids: ${LOG_INCLUDE_ORDER_IDS:false}
      include-owner-references: ${LOG_INCLUDE_OWNER_REFERENCES:false}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.omar.sentra.order: INFO
